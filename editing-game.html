<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit This Photo Challenge</title>
<style>
    :root {
        --bg: #f4eee7;
        --panel: #fffaf5;
        --border: #e8dacd;
        --text: #2e2c2a;
        --muted: #6e655f;
        --accent: #5d4235;
        --button: #2d211b;
        --button-hover: #1f1712;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background:
            radial-gradient(circle at 12% 0%, #f7e5d6 0%, rgba(247, 229, 214, 0) 35%),
            radial-gradient(circle at 92% -10%, #f1d6c2 0%, rgba(241, 214, 194, 0) 40%),
            var(--bg);
        color: var(--text);
    }

    .container {
        width: min(1080px, 94vw);
        margin: 2rem auto;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: 0 20px 40px rgba(40, 28, 18, 0.08);
        padding: 1.25rem;
    }

    .header-row {
        text-align: center;
        margin-bottom: 1rem;
    }

    h1 {
        margin: 0;
        font-size: clamp(1.5rem, 2.8vw, 2.2rem);
        color: var(--accent);
    }

    .subtitle {
        margin: 0.45rem 0 0;
        color: var(--muted);
    }

    .editor-layout {
        display: grid;
        gap: 1rem;
        grid-template-columns: 1.35fr 1fr;
        align-items: start;
    }

    .photo-stage {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.85rem;
    }

    .photo-card {
        background: #ffffff;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 0.65rem;
    }

    .photo-label {
        margin: 0 0 0.45rem;
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--accent);
    }

    .photo-wrap {
        width: 100%;
        border-radius: 10px;
        overflow: hidden;
        background: #f4ede7;
        box-shadow: inset 0 0 0 1px rgba(98, 72, 54, 0.08);
    }

    .photo-instruction {
        margin: 0.7rem 0 0;
        padding: 0.75rem 0.85rem;
        border-radius: 10px;
        border: 2px solid #d38a51;
        background: linear-gradient(135deg, #fff1e2, #ffe4c7);
        color: #4a2710;
        font-size: 1rem;
        font-weight: 900;
        text-align: center;
        letter-spacing: 0.2px;
        text-transform: none;
        box-shadow: 0 8px 18px rgba(123, 71, 36, 0.18);
    }

    img {
        width: 100%;
        display: block;
        aspect-ratio: 4 / 3;
        object-fit: cover;
    }

    .hidden {
        display: none;
    }

    .controls-panel {
        background: #ffffff;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 0.85rem;
    }

    .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
    }

    .control-group {
        background: #fff7f0;
        border: 1px solid #ecdccf;
        border-radius: 10px;
        padding: 0.55rem 0.6rem;
    }

    .control-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.3rem;
        gap: 0.5rem;
    }

    label {
        font-size: 0.85rem;
        font-weight: 700;
        color: #5c4638;
    }

    .value {
        font-size: 0.8rem;
        color: var(--muted);
    }

    input[type="range"] {
        width: 100%;
    }

    .button-row {
        margin-top: 0.8rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
    }

    button {
        border: none;
        border-radius: 9px;
        padding: 0.58rem 0.78rem;
        background: var(--button);
        color: #ffffff;
        cursor: pointer;
        font-weight: 700;
        font-size: 0.86rem;
    }

    button:hover {
        background: var(--button-hover);
    }

    .secondary {
        background: #ece1d7;
        color: #4f3b2f;
        border: 1px solid #dac6b6;
    }

    .secondary:hover {
        background: #e3d6ca;
    }

    .back-link {
        margin-top: 1rem;
        text-align: center;
    }

    .back-link a {
        color: #5c4638;
        text-decoration: none;
        font-weight: 700;
    }

    .back-link a:hover {
        text-decoration: underline;
    }

    @media (max-width: 920px) {
        .editor-layout {
            grid-template-columns: 1fr;
        }
    }

    @media (max-width: 680px) {
        .photo-stage {
            grid-template-columns: 1fr;
        }

        .controls {
            grid-template-columns: 1fr;
        }
    }
</style>
</head>
<body>

<div class="container">
    <div class="header-row">
        <h1>Edit This Photo Challenge</h1>
        <p class="subtitle">Start with a softer, less-edited image and match the photographer's final look.</p>
    </div>

    <div class="editor-layout">
        <section class="photo-stage" aria-label="Photo preview">
            <article class="photo-card">
                <p class="photo-label">Your Edit</p>
                <div class="photo-wrap" id="photoWrap">
                    <img id="photo" src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1200&q=70" crossorigin="anonymous" alt="Editable photo">
                </div>
                <p class="photo-instruction">Start moving the sliders to reveal the photo and edit it!</p>
            </article>
        </section>

        <section class="controls-panel">
            <div class="controls">
                <div class="control-group">
                    <div class="control-head">
                        <label for="contrast">Contrast</label>
                        <span class="value" id="contrastValue"></span>
                    </div>
                    <input type="range" min="0" max="150" value="0" id="contrast">
                </div>

                <div class="control-group">
                    <div class="control-head">
                        <label for="brightness">Exposure</label>
                        <span class="value" id="brightnessValue"></span>
                    </div>
                    <input type="range" min="0" max="150" value="0" id="brightness">
                </div>

                <div class="control-group">
                    <div class="control-head">
                        <label for="saturation">Saturation</label>
                        <span class="value" id="saturationValue"></span>
                    </div>
                    <input type="range" min="0" max="170" value="0" id="saturation">
                </div>

                <div class="control-group">
                    <div class="control-head">
                        <label for="warmth">Warmth</label>
                        <span class="value" id="warmthValue"></span>
                    </div>
                    <input type="range" min="0" max="45" value="0" id="warmth">
                </div>

                <div class="control-group">
                    <div class="control-head">
                        <label for="blur">Blur</label>
                        <span class="value" id="blurValue"></span>
                    </div>
                    <input type="range" min="0" max="5" value="0" id="blur">
                </div>

                <div class="control-group">
                    <div class="control-head">
                        <label for="hue">Tint</label>
                        <span class="value" id="hueValue"></span>
                    </div>
                    <input type="range" min="0" max="25" value="0" id="hue">
                </div>

                <div class="control-group">
                    <div class="control-head">
                        <label for="grayscale">Fade Color</label>
                        <span class="value" id="grayscaleValue"></span>
                    </div>
                    <input type="range" min="0" max="100" value="0" id="grayscale">
                </div>

                <div class="control-group">
                    <div class="control-head">
                        <label for="vignette">Vignette</label>
                        <span class="value" id="vignetteValue"></span>
                    </div>
                    <input type="range" min="0" max="60" value="0" id="vignette">
                </div>
            </div>

            <div class="button-row">
                <button onclick="resetEdit()" type="button">Reset</button>
                <button onclick="toggleCompare()" type="button">Before/After</button>
            </div>

            <div class="button-row">
                <button class="secondary" onclick="loadPhoto(1)" type="button">Photo 1</button>
                <button class="secondary" onclick="loadPhoto(2)" type="button">Photo 2</button>
            </div>
        </section>
    </div>

    <p class="back-link"><a href="about.html">Back to About Me</a></p>
</div>

<script>
const photo = document.getElementById("photo");
const photoWrap = document.getElementById("photoWrap");

const defaults = {
    brightness: 0,
    contrast: 0,
    saturation: 0,
    warmth: 0,
    blur: 0,
    hue: 0,
    grayscale: 0,
    vignette: 0
};

const sliders = {
    brightness: document.getElementById("brightness"),
    contrast: document.getElementById("contrast"),
    saturation: document.getElementById("saturation"),
    warmth: document.getElementById("warmth"),
    blur: document.getElementById("blur"),
    hue: document.getElementById("hue"),
    grayscale: document.getElementById("grayscale"),
    vignette: document.getElementById("vignette")
};

const sliderValueLabels = {
    brightness: document.getElementById("brightnessValue"),
    contrast: document.getElementById("contrastValue"),
    saturation: document.getElementById("saturationValue"),
    warmth: document.getElementById("warmthValue"),
    blur: document.getElementById("blurValue"),
    hue: document.getElementById("hueValue"),
    grayscale: document.getElementById("grayscaleValue"),
    vignette: document.getElementById("vignetteValue")
};

function updateValueLabels() {
    sliderValueLabels.brightness.textContent = `${sliders.brightness.value}%`;
    sliderValueLabels.contrast.textContent = `${sliders.contrast.value}%`;
    sliderValueLabels.saturation.textContent = `${sliders.saturation.value}%`;
    sliderValueLabels.warmth.textContent = `${sliders.warmth.value}%`;
    sliderValueLabels.blur.textContent = `${sliders.blur.value}px`;
    sliderValueLabels.hue.textContent = `${sliders.hue.value}deg`;
    sliderValueLabels.grayscale.textContent = `${sliders.grayscale.value}%`;
    sliderValueLabels.vignette.textContent = `${sliders.vignette.value}%`;
}

function updateFilters() {
    const b = sliders.brightness.value;
    const c = sliders.contrast.value;
    const s = sliders.saturation.value;
    const w = sliders.warmth.value;
    const bl = sliders.blur.value;
    const h = sliders.hue.value;
    const g = sliders.grayscale.value;
    const v = sliders.vignette.value;

    photo.style.filter = `
        brightness(${b}%)
        contrast(${c}%)
        saturate(${s}%)
        sepia(${w}%)
        blur(${bl}px)
        hue-rotate(${h}deg)
        grayscale(${g}%)
    `;

    const vignetteOpacity = Math.min(v / 100, 0.55);
    photoWrap.style.boxShadow = `inset 0 0 120px rgba(35, 24, 18, ${vignetteOpacity})`;
    updateValueLabels();
}

Object.values(sliders).forEach((slider) => {
    slider.addEventListener("input", updateFilters);
});

function resetEdit() {
    Object.entries(defaults).forEach(([key, value]) => {
        sliders[key].value = value;
    });
    updateFilters();
}

let showingOriginal = false;
function toggleCompare() {
    if (!showingOriginal) {
        photo.style.filter = "none";
        photoWrap.style.boxShadow = "none";
        showingOriginal = true;
        return;
    }
    updateFilters();
    showingOriginal = false;
}

function loadPhoto(num) {
    if (num === 1) {
        photo.src = "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1200&q=70";
    } else {
        photo.src = "https://images.unsplash.com/photo-1492724441997-5dc865305da7?auto=format&fit=crop&w=1200&q=68";
    }

    resetEdit();
}

resetEdit();
</script>

</body>
</html>
